<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link rel="stylesheet" href="./css/divisas.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h1>Conversor de Divisas</h1>
        <p>Convierte cualquier moneda oficial del mundo en segundos</p>
    </header>
    
    <!-- ADS SUPERIOR-->
    <!--
    <section class="ads-area">
        <div class="ads-placeholder">Espacio para anuncio superior</div>
    </section>
    -->

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="container"> <!-- volvemos a usar .container -->
        <div class="card">
            <label>Cantidad</label>
            <input type="number" id="amount" placeholder="Introduce cantidad" value="1">

            <label>De</label>
            <select id="fromCurrency"></select>

            <label>A</label>
            <select id="toCurrency"></select>

            <button id="convertBtn">Convertir</button>

            <h2 id="result">Resultado aparecerá aquí</h2>
        </div>
    </main>

    <!-- ADS INFERIOR -->
    <!--
    <section class="ads-area">
        <div class="ads-placeholder">Espacio para anuncio inferior</div>
    </section>
    -->

    <!-- FOOTER -->
    <footer class="footer">
        <a href="../index.html">MultiHerramientasOnline</a>
        <p>© 2026 MultiHerramientasOnline — Herramientas gratuitas para todos</p>
    </footer>

    <script src="./javascript/divisas.js"></script>
</body>
</html>
